<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <link rel="stylesheet" href="./homes.css" />
</head>
<body>
    <header>
        <h1>Search Results for "<span id="search-query"></span>"</h1>
        <a href="/home.html">← Back to Home</a>
    </header>

    <main>
        <section id="results">
            <!-- نتائج البحث هتظهر هنا -->
        </section>
    </main>

    <script>
        // جلب قيمة البحث من الـ URL
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get("q");

        document.getElementById("search-query").textContent = query;

        // استدعاء الـ API
        fetch(`/search/api/search?q=${query}`)
            .then(response => response.json())
            .then(data => {
                const resultsSection = document.getElementById("results");

                if (data.products.length === 0) {
                    resultsSection.innerHTML = "<p>No results found.</p>";
                    return;
                }

                data.products.forEach(product => {
                    const div = document.createElement("div");
                    div.classList.add("product-card");
                    div.innerHTML = `
                        <h3>${product.name}</h3>
                        <p><strong>Category:</strong> ${product.category}</p>
                        <p><strong>Price:</strong> ${product.price} ر.س</p>
                        <p>${product.description}</p>
                        <img src="${product.image}" alt="${product.name}" style="width: 150px; height: auto;" />
                    `;
                    resultsSection.appendChild(div);
                });
            })
            .catch(err => {
                console.error("Error fetching search results:", err);
            });
    </script>
</body>
</html>
