<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocky Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .profile-container {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            position: relative;
        }

        #profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ff4500;
        }

        #file-input {
            display: none;
        }

        .profile-header h2 {
            margin: 10px 0 5px;
            color: #ff4500;
        }

        .profile-header p {
            color: gray;
            font-size: 14px;
        }

        .menu ul {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .menu ul li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .menu ul li:last-child {
            border-bottom: none;
        }

        .menu ul li a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        .logout {
            background-color: #ff4500;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .logout:hover {
            background-color: #ff4500;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <label for="file-input">
                <img id="profile-pic" src="https://via.placeholder.com/80" alt="upload photo">
            </label>
            <input type="file" id="file-input" accept="image/*">
          <h2>username : <span id="username">!</span></h2>  
            <p>Email</p>
        </div>

        <div class="menu">
            <ul>
                <li><a href="#">📦 Orders</a></li>
                <li><a href="#">📋 My Details</a></li>
                <li><a href="#">📍 Delivery Address</a></li>
                <li><a href="#">💳 Payment Methods</a></li>
                <li><a href="#">🏷 Promo Code</a></li>
                <li><a href="#">🔔 Notifications</a></li>
                <li><a href="#">❓ Help</a></li>
                <li><a href="#">ℹ About</a></li>
            </ul>
        </div>

        <button class="logout" id="logout">Log Out</button>
    </div>

    <script>
        // Handle profile picture upload
        document.getElementById("file-input").addEventListener("change", function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("profile-pic").src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });


    </script>
     <script src="script.js"></script>
</body>
</html>
